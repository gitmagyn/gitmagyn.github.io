<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linux Terminal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body { 
            background-color: #000; 
            color: #fff;
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 15px; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden;
            font-size: 16px;
        }
        
        #terminal { 
            height: 100%; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            word-wrap: break-word;
        }

        .line { 
            margin-bottom: 5px; 
            white-space: pre-wrap; 
            line-height: 1.3;
        }
        
        .prompt { 
            color: #4ade80;
            font-weight: bold; 
            margin-right: 8px; 
        }

        #input-area { 
            display: flex; 
            align-items: flex-start;
            flex-wrap: wrap;
        }

        #cursor { 
            display: inline-block;
            background-color: #fff; 
            color: #000;
            min-width: 9.6px;
            animation: blink 1s step-end infinite; 
        }
        
        #cursor.solid { animation: none; opacity: 1; }

        @keyframes blink { 50% { opacity: 0; } }
        
        #ghost-input { 
            position: fixed; 
            top: -1000px; 
            left: -1000px; 
            opacity: 0; 
        }
    </style>
</head>
<body>
    
    <div id="terminal">
        <div id="output">
            <div class="line">Linux 5.15.0-generic x86_64</div>
        </div>

        <div id="input-area">
            <span class="prompt">root@linux:~$</span>
            <span id="text-before"></span><span id="cursor">&nbsp;</span><span id="text-after"></span>
        </div>
        
        <input type="text" id="ghost-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none" autofocus>
    </div>

    <script>
        const API_KEY = "AIzaSyAutEA3CylK3d9hF7vAR8Etz36TpENItKs";
        const MODEL = "gemini-3.1-flash-lite";
        const history = [];

        const ghostInput = document.getElementById('ghost-input');
        const textBefore = document.getElementById('text-before');
        const textAfter = document.getElementById('text-after');
        const cursor = document.getElementById('cursor');
        const outputDiv = document.getElementById('output');
        const inputArea = document.getElementById('input-area');
        const terminalDiv = document.getElementById('terminal');

        document.addEventListener('click', () => {
            if (!ghostInput.disabled) {
                ghostInput.focus();
            }
        });

        function updateDisplay() {
            const val = ghostInput.value;
            const pos = ghostInput.selectionStart;

            textBefore.textContent = val.substring(0, pos);
            
            let charUnderCursor = val.substring(pos, pos + 1);
            if (charUnderCursor === '') {
                charUnderCursor = '\u00A0';
            }
            cursor.textContent = charUnderCursor;
            
            textAfter.textContent = val.substring(pos + 1);

            cursor.classList.add('solid');
            clearTimeout(window.blinkTimeout);
            window.blinkTimeout = setTimeout(() => {
                cursor.classList.remove('solid');
            }, 300);

            terminalDiv.scrollTop = terminalDiv.scrollHeight;
        }

        ['input', 'keydown', 'keyup', 'click', 'focus'].forEach(evt => {
            ghostInput.addEventListener(evt, () => {
                setTimeout(updateDisplay, 10);
            });
        });

        ghostInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const command = ghostInput.value.trim();
                if (!command) return;

                // Cria a linha do comando que o usuário enviou
                const commandLine = document.createElement('div');
                commandLine.className = 'line';
                commandLine.innerHTML = `<span class="prompt">root@linux:~$</span> ${command}`;
                outputDiv.appendChild(commandLine);

                ghostInput.value = '';
                ghostInput.disabled = true;
                inputArea.style.display = 'none';
                updateDisplay();
                
                history.push({ "role": "user", "parts":[{ "text": command }] });

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            "system_instruction": { "parts":[{ "text": "Você é um terminal Linux. Responda apenas com a saída dos comandos. Não explique nada. Seja técnico. Responda em texto puro." }] },
                            "contents": history
                        })
                    });

                    const data = await response.json();
                    const botResponse = data.candidates[0].content.parts[0].text;

                    const responseLine = document.createElement('div');
                    responseLine.className = 'line';
                    responseLine.innerHTML = botResponse.replace(/\n/g, '<br>');
                    outputDiv.appendChild(responseLine);

                    history.push({ "role": "model", "parts":[{ "text": botResponse }] });

                } catch (error) {
                    const errorLine = document.createElement('div');
                    errorLine.className = 'line';
                    errorLine.style.color = '#ff4444';
                    errorLine.textContent = "bash: erro de conexão ou limite da API excedido.";
                    outputDiv.appendChild(errorLine);
                } finally {
                    inputArea.style.display = 'flex';
                    ghostInput.disabled = false;
                    
                    setTimeout(() => {
                        ghostInput.focus();
                        updateDisplay();
                    }, 50);
                }
            }
        });
        
        updateDisplay();
    </script>
</body>
</html>
