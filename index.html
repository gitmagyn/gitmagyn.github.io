<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Linux Terminal</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff;
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #terminal { 
            height: 100%; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .line { margin-bottom: 5px; white-space: pre-wrap; }
        .prompt { color: #fff; font-weight: bold; margin-right: 10px; }

        #input-area { display: flex; align-items: center; }
        
        /* O cursor só aparece se não estiver processando */
        #cursor { width: 10px; height: 18px; background-color: #fff; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        #ghost-input { opacity: 0; position: absolute; z-index: -1; }
    </style>
</head>
<body onclick="document.getElementById('ghost-input').focus()">
    
    <div id="terminal">
        <div id="output">
            <div class="line">Linux Terminal AI v1.0</div>
        </div>

        <div id="input-area">
            <span class="prompt">root@linux:~$</span>
            <span id="typed-text"></span>
            <span id="cursor"></span>
        </div>
        <input type="text" id="ghost-input" autofocus>
    </div>

    <script>
        const API_KEY = "AIzaSyDACqjBcZ-9jwyv7ONilxKcC9BspetCGPY"; 
        const MODEL = "gemini-3.1-flash-lite";
        const history =[];

        const ghostInput = document.getElementById('ghost-input');
        const typedText = document.getElementById('typed-text');
        const outputDiv = document.getElementById('output');
        const cursor = document.getElementById('cursor');
        
        let isProcessing = false; // Flag para controlar o estado

        ghostInput.addEventListener('input', () => {
            if (!isProcessing) {
                typedText.textContent = ghostInput.value;
            }
        });

        ghostInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const command = ghostInput.value;
                if (!command || isProcessing) return; // Bloqueia se vazio ou processando

                // --- BLOQUEAR INPUT ---
                isProcessing = true;
                ghostInput.disabled = true; // Impede digitação
                cursor.style.display = 'none'; // Esconde cursor

                const commandLine = document.createElement('div');
                commandLine.className = 'line';
                commandLine.innerHTML = `<span class="prompt">root@linux:~$</span> ${command}`;
                outputDiv.appendChild(commandLine);

                ghostInput.value = '';
                typedText.textContent = '';
                
                history.push({ "role": "user", "parts":[{ "text": command }] });

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            "system_instruction": { "parts":[{ "text": "Você é um terminal Linux. Responda apenas com a saída dos comandos. Não explique nada. Seja técnico. Responda em texto puro." }] },
                            "contents": history
                        })
                    });

                    const data = await response.json();
                    const botResponse = data.candidates[0].content.parts[0].text;

                    const responseLine = document.createElement('div');
                    responseLine.className = 'line';
                    responseLine.innerHTML = botResponse.replace(/\n/g, '<br>');
                    outputDiv.appendChild(responseLine);

                    history.push({ "role": "model", "parts":[{ "text": botResponse }] });
                    
                    document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;

                } catch (error) {
                    outputDiv.innerHTML += `<div class="line" style="color:red">Erro: falha na comunicação.</div>`;
                } finally {
                    // --- LIBERAR INPUT ---
                    isProcessing = false;
                    ghostInput.disabled = false; // Reabilita
                    cursor.style.display = 'inline-block'; // Mostra cursor
                    ghostInput.focus(); // Devolve o foco
                }
            }
        });
    </script>
</body>
</html>
